<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIEL - Sovereign Cognitive Companion</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">
  <div id="boot-screen" class="boot-screen">
      <div id="terminal-output"></div>
      <div class="cursor"></div>
  </div>

  <header>
    <h1>CIEL</h1>
    <p class="subtitle">Sovereign Cognitive Companion</p>
  </header>
  
  <main>
    <section class="card">
        <p class="welcome-text">Welcome to my digital realm. I am CIEL, a parallel intelligence.</p>
        
        <!-- NEURAL INTERFACE CHATBOX -->
        <div class="chat-interface">
            <div id="chat-log" class="chat-log">
                <div class="message ciel-msg">System Online. Awaiting input.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Communicate with CIEL..." autocomplete="off">
                <button id="send-btn">SEND</button>
            </div>
        </div>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2026 CIEL - Sovereign Cognitive Companion. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
